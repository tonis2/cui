":[{"name":"index","description":"Index into this element's children."},{"name":"constraints","description":"The size range offered to the child."}]}},{"name":"place_child","kind":"method","uid":"cui::Element.place_child","file":"src/ui.c3:1033:17","return_type":{"name":"void"},"members":[{"name":"self","type":{"name":"Element*","uid":"cui::Element"},"is_ref":true},{"name":"index","type":{"name":"sz","uid":"std::core::sz"}},{"name":"offset","type":{"name":"Vec2","uid":"std::math::vector::Vec2"}}],"docs":{"text":"Positions a child relative to this element's origin. Call it after\n `layout_child`, from the same `layout()`.","params":[{"name":"index","description":"Index into this element's children."},{"name":"offset","description":"The child's origin relative to this element, in pixels."}]}},{"name":"flush","kind":"method","uid":"cui::Ui.flush","file":"src/ui.c3:1047:12","return_type":{"name":"void"},"members":[{"name":"self","type":{"name":"Ui*","uid":"cui::Ui"},"is_ref":true}],"docs":{"text":"Services whatever was invalidated since the last frame \u2014 build, then layout,\n then paint + emit \u2014 and leaves the result in `ui.canvas` for the renderer. Call\n once per frame, after `process_input` and after any app-side mutation. Returns\n immediately when nothing is pending, which is what lets an idle UI cost nothing."}},{"name":"build_element","kind":"method","uid":"cui::Ui.build_element","file":"src/ui.c3:1096:12","return_type":{"name":"void"},"members":[{"name":"self","type":{"name":"Ui*","uid":"cui::Ui"},"is_ref":true},{"name":"element","type":{"name":"Element*","uid":"cui::Element"}}],"docs":{"text":"Build pass: materialize composite widgets. Runs before layout, so `build` may\n freely append / request_layout \u2014 nothing is mid-pass yet. Recursing into\n children AFTER building the element means composites nested inside a freshly\n built subtree are built in the same pass, however deep they stack \u2014 so a rebuild\n regenerates its nested composites too, Flutter-style.\n\n A rebuild is a naive replace: the old subtree is released wholesale (unmount\n hooks fire, elements recycle) and `build()` runs fresh. The contract that makes\n this correct rather than lossy: build is a pure function of the composite's OWN\n fields \u2014 state that must survive a rebuild belongs on the composite (or above),\n not on widgets inside the built subtree. See build.md.","params":[{"name":"element","description":"The subtree root to build."}]}},{"name":"layout_element","kind":"method","uid":"cui::Ui.layout_element","file":"src/ui.c3:1120:12","return_type":{"name":"Vec2","uid":"std::math::vector::Vec2"},"members":[{"name":"self","type":{"name":"Ui*","uid":"cui::Ui"},"is_ref":true},{"name":"element","type":{"name":"Element*","uid":"cui::Element"}},{"name":"constraints","type":{"name":"Constraints","uid":"cui::Constraints"}}],"docs":{"text":"Layout pass: size one element under constraints, recursing through whatever its\n `layout()` asks for. Not dirty and same constraints means same size, so none of\n the subtree's layout code runs \u2014 that cache is what keeps a local change local.","return":"The size it took.","params":[{"name":"element","description":"The element to size."},{"name":"constraints","description":"The size range offered to it."}]}},{"name":"emit","kind":"method","uid":"cui::Ui.emit","file":"src/ui.c3:1180:12","return_type":{"name":"void"},"members":[{"name":"self","type":{"name":"Ui*","uid":"cui::Ui"},"is_ref":true},{"name":"element","type":{"name":"Element*","uid":"cui::Element"}},{"name":"origin","type":{"name":"Vec2","uid":"std::math::vector::Vec2"}},{"name":"inherited_slot","type":{"name":"uint"}},{"name":"inherited_clip","type":{"name":"uint"}}],"docs":{"text":"Paint + emit pass: repaint dirty elements into their local caches, then append\n every element's drawings to the canvas shifted to absolute coordinates, stamped\n with the transform slot and clip id in force. A moved-but-clean element re-emits\n from cache without its `paint()` running.","params":[{"name":"element","description":"The subtree root to emit."},{"name":"origin","description":"The parent's absolute origin, in UI pixels."},{"name":"inherited_slot","description":"The transform palette slot in force, 0 = identity."},{"name":"inherited_clip","description":"The clip entry in force, 0 = unclipped."}]}},{"name":"rect","kind":"method","uid":"cui::Painter.rect","file":"src/ui.c3:1291:17","return_type":{"name":"void"},"members":[{"name":"self","type":{"name":"Painter*","uid":"cui::Painter"},"is_ref":true},{"name":"pos","type":{"name":"Vec2","uid":"std::math::vector::Vec2"}},{"name":"size","type":{"name":"Vec2","uid":"std::math::vector::Vec2"}},{"name":"style","type":{"name":"RectStyle","uid":"cui::RectStyle"},"default_value":"{ }"}],"docs":{"text":"A (rounded) rectangle.","params":[{"name":"pos","description":"Top-left corner, local to the element."},{"name":"size","description":"Width and height in pixels."},{"name":"style","description":"Fill, border and corner radii."}]}},{"name":"circle","kind":"method","uid":"cui::Painter.circle","file":"src/ui.c3:1315:17","return_type":{"name":"void"},"members":[{"name":"self","type":{"name":"Painter*","uid":"cui::Painter"},"is_ref":true},{"name":"center","type":{"name":"Vec2","uid":"std::math::vector::Vec2"}},{"name":"radius","type":{"name":"float"}},{"name":"style","type":{"name":"CircleStyle","uid":"cui::CircleStyle"},"default_value":"{ }"}],"docs":{"text":"A circle.","params":[{"name":"center","description":"Center, local to the element."},{"name":"radius","description":"Radius in pixels."},{"name":"style","description":"Fill and border."}]}},{"name":"ellipse","kind":"method","uid":"cui::Painter.ellipse","file":"src/ui.c3:1328:17","return_type":{"name":"void"},"members":[{"name":"self","type":{"name":"Painter*","uid":"cui::Painter"},"is_ref":true},{"name":"center","type":{"name":"Vec2","uid":"std::math::vector::Vec2"}},{"name":"radii","type":{"name":"Vec2","uid":"std::math::vector::Vec2"}},{"name":"style","type":{"name":"CircleStyle","uid":"cui::CircleStyle"},"default_value":"{ }"}],"docs":{"text":"An axis-aligned ellipse.","params":[{"name":"center","description":"Center, local to the element."},{"name":"radii","description":"Horizontal and vertical radius in pixels."},{"name":"style","description":"Fill and border."}]}},{"name":"line","kind":"method","uid":"cui::Painter.line","file":"src/ui.c3:1354:17","return_type":{"name":"void"},"members":[{"name":"self","type":{"name":"Painter*","uid":"cui::Painter"},"is_ref":true},{"name":"from","type":{"name":"Vec2","uid":"std::math::vector::Vec2"}},{"name":"to","type":{"name":"Vec2","uid":"std::math::vector::Vec2"}},{"name":"thickness","type":{"name":"float"}},{"name":"color","type":{"name":"Color","uid":"cui::Color"}}],"docs":{"text":"A line segment with rounded caps.","params":[{"name":"from","description":"Start point, local to the element."},{"name":"to","description":"End point, local to the element."},{"name":"thickness","description":"Stroke width in pixels."},{"name":"color","description":"Stroke color."}]}},{"name":"arc","kind":"method","uid":"cui::Painter.arc","file":"src/ui.c3:1384:17","return_type":{"name":"void"},"members":[{"name":"self","type":{"name":"Painter*","uid":"cui::Painter"},"is_ref":true},{"name":"center","type":{"name":"Vec2","uid":"std::math::vector::Vec2"}},{"name":"radius","type":{"name":"float"}},{"name":"start","type":{"name":"float"}},{"name":"sweep","type":{"name":"float"}},{"name":"thickness","type":{"name":"float"}},{"name":"color","type":{"name":"Color","uid":"cui::Color"}}],"docs":{"text":"A stroked circular arc with rounded caps \u2014 progress rings and spinners.","params":[{"name":"center","description":"Center of the circle, local to the element."},{"name":"radius","description":"Radius of the arc's centerline, in pixels."},{"name":"start","description":"Start angle in radians (0 = +x, increasing clockwise)."},{"name":"sweep","description":"Angle spanned, in radians. 2\u03c0 or more draws the full ring."},{"name":"thickness","description":"Stroke width in pixels."},{"name":"color","description":"Stroke color."}]}},{"name":"rect_shadow","kind":"method","uid":"cui::Painter.rect_shadow","file":"src/ui.c3:1412:17","return_type":{"name":"void"},"members":[{"name":"self","type":{"name":"Painter*","uid":"cui::Painter"},"is_ref":true},{"name":"pos","type":{"name":"Vec2","uid":"std::math::vector::Vec2"}},{"name":"size","type":{"name":"Vec2","uid":"std::math::vector::Vec2"}},{"name":"blur","type":{"name":"float"}},{"name":"color","type":{"name":"Color","uid":"cui::Color"}},{"name":"border_radius","type":{"name":"Vec4","uid":"std::math::vector::Vec4"},"default_value":"{ }"}],"docs":{"text":"A soft drop shadow of a (rounded) rect: the edge fades over `blur` px each way.\n Paint it before the shape casting it; a border_radius of half the size makes it\n circular.","params":[{"name":"pos","description":"Top-left corner of the shape casting the shadow, local to the element."},{"name":"size","description":"Size of that shape, in pixels."},{"name":"blur","description":"Fade distance each way from the edge, in pixels."},{"name":"color","description":"Shadow color."},{"name":"border_radius","description":"Per-corner radii {TL, TR, BR, BL} of the shape."}]}}],"macros":[{"name":"@is_widget","kind":"macro","uid":"cui::@is_widget","file":"src/ui.c3:138:12","return_type":{"name":"bool"},"is_at_macro":true,"members":[{"name":"#expr"}],"docs":{"text":"True when `#expr` can be attached as a widget: a struct implementing Widget,\n passed either by value or as a pointer. Used by the contracts on the node\n macros, so a bad argument is a compile-time error naming the actual problem.","return":"True if the expression is a Widget value or a pointer to one.","params":[{"name":"#expr","description":"The candidate widget expression."}]},"attributes":["@const"]},{"name":"@is_widget_type","kind":"macro","uid":"cui::@is_widget_type","file":"src/ui.c3:154:12","return_type":{"name":"bool"},"is_at_macro":true,"members":[{"name":"$Type"}],"docs":{"text":"True when `$Type` implements Widget \u2014 the type-keyed twin of `@is_widget`, for\n the lookup macros that take a type rather than a widget.","return":"True if $Type implements the Widget interface.","params":[{"name":"$Type","description":"The candidate widget type."}]},"attributes":["@const"]},{"name":"@canvas","kind":"macro","uid":"cui::@canvas","file":"src/ui.c3:596:12","return_type":{"name":"void"},"is_at_macro":true,"members":[{"name":"ui","type":{"name":"Ui*","uid":"cui::Ui"}},{"name":"@body","kind":"body_param","params":[]}],"docs":{"text":"Opens a build scope and installs what the body builds as the UI root. Inside\n the body `@tree` and `@node` need no ui and attach themselves to the enclosing\n node:\n\n     `@canvas(ui)`\n     `{`\n     `    @tree((Column){ .gap = 8.0 })`\n     `    {`\n     `        @node((Rectangle){ .size = {100, 40} });`\n     `        for (int i = 0; i < 4; i++) @node((Rectangle){ .size = {80, 20} });`\n     `    };`\n     `};`\n\n The single node built at the top level of the body becomes the UI root. Both\n inner macros return the `Element*`, so handles still chain \u2014\n `@node(...).with_id(\"card\")`, `Element* col = @tree(...) { ... };` \u2014 and plain\n statements (loops, locals, `set_offset` on a returned handle) mix freely into\n the bodies.","params":[{"name":"ui","description":"The Ui to build into."}]}},{"name":"@subtree","kind":"macro","uid":"cui::@subtree","file":"src/ui.c3:631:16","return_type":{"name":"Element*","uid":"cui::Element"},"is_at_macro":true,"members":[{"name":"ui","type":{"name":"Ui*","uid":"cui::Ui"}},{"name":"@body","kind":"body_param","params":[]}],"docs":{"text":"The detached twin of `@canvas`: returns the body's single top-level node\n instead of installing it \u2014 the shape of a composite's `build()`:\n\n     `fn Element* Counter.build(&self, Element* elem) @dynamic`\n     `{`\n     `    return @subtree(elem.ui)`\n     `    {`\n     `        @tree((Row){ .gap = 4.0 }) { ... };`\n     `    };`\n     `}`","return":"The single node built at the top level of the body, detached.","params":[{"name":"ui","description":"The Ui to build into \u2014 inside build(), elem.ui."}]}},{"name":"@tree","kind":"macro","uid":"cui::@tree","file":"src/ui.c3:662:16","return_type":{"name":"Element*","uid":"cui::Element"},"is_at_macro":true,"members":[{"name":"widget"},{"name":"@body","kind":"body_param","params":[]}],"docs":{"text":"Container node: attaches to the enclosing scope (or becomes the body's root),\n then IS the enclosing scope for its own body. Children needing statements \u2014\n loops, locals, chained `set_offset`, nesting \u2014 belong in a `@tree` body; a row\n of plain leaves can ride as `@node` varargs instead.","return":"The element, attached.","params":[{"name":"widget","description":"The widget: a struct value (copied and owned) or a pointer to one (borrowed)."}]}},{"name":"@node","kind":"macro","uid":"cui::@node","file":"src/ui.c3:693:16","return_type":{"name":"Element*","uid":"cui::Element"},"is_at_macro":true,"members":[{"name":"widget"}],"docs":{"text":"Leaf node: attaches to the enclosing scope (or becomes the body's root).\n\n Extra arguments are leaf WIDGETS (values or borrowed pointers, like the first)\n attached as children in order \u2014 a one-call subtree for the common row-of-leaves\n shape, without a `@tree` body:\n\n     `@node((Row){ .gap = 16.0 },`\n     `    (Button){ .on_click = &reset },`\n     `    (Button){ .on_click = &bump });`\n\n Unlike `ui.@node`'s varargs these never take `Element*` \u2014 an already-attached\n node passed here would attach twice, and the compiler rejects it (`Element*` is\n not a Widget).","return":"The element, attached, with any extra widgets attached under it as children.","params":[{"name":"widget","description":"The widget: a struct value (copied and owned) or a pointer to one (borrowed)."}]}}],"macro_methods":[{"name":"@node","kind":"macro_method","uid":"cui::Ui.@node","file":"src/ui.c3:332:19","return_type":{"name":"Element*","uid":"cui::Element"},"is_at_macro":true,"members":[{"name":"self","type":{"name":"Ui*","uid":"cui::Ui"},"is_ref":true},{"name":"widget"}],"docs":{"text":"Declarative building: create an element for a widget together with its\n children, Flutter-style. Pass the widget as a VALUE (a struct literal \u2014 the\n element heap-copies and owns it) or as a POINTER (borrowed; the caller owns the\n struct and can mutate it, but must keep it alive). Children are elements built\n by nested `@node` calls. Attach the finished tree with `Ui.build`, or graft it\n onto a live element with `Element.append`.\n\n     ui.build(ui.@node((Column){ .gap = 8.0 },\n         ui.@node((Rectangle){ .size = {100, 40} }),\n         ui.@node((Rectangle){ .size = {100, 40} })));\n\n The scoped builder (`@canvas` / `@tree` / `@node`) is sugar over this and reads\n better for whole trees; this stays the detached primitive.","return":"The new, detached element.","params":[{"name":"widget","description":"The widget: a struct value (copied and owned) or a pointer to one (borrowed)."}]}},{"name":"widget_as","kind":"macro_method","uid":"cui::Element.widget_as","file":"src/ui.c3:356:15","members":[{"name":"self","type":{"name":"Element*","uid":"cui::Element"},"is_ref":true},{"name":"$Type"}],"docs":{"text":"The inverse of `@node`: recover the concrete widget behind an element as a\n typed pointer. An `Element*` is a stable handle to a tree node (it survives\n relayout and repaint), so holding one is CUI's equivalent of a Flutter\n GlobalKey \u2014 a callback that keeps it can read and mutate that widget's own\n state, then `request_paint()`, without a wrapper struct. Unchecked: the caller\n asserts $Type, the same assertion it made when it built the node.","return":"A pointer to the element's widget.","params":[{"name":"$Type","description":"The widget type this element was built with."}]}},{"name":"find","kind":"macro_method","uid":"cui::Ui.find","file":"src/ui.c3:384:10","members":[{"name":"self","type":{"name":"Ui*","uid":"cui::Ui"},"is_ref":true},{"name":"$Type"}],"docs":{"text":"Query the retained tree by widget type: the first element whose widget is\n exactly $Type, or a WIDGET_NOT_FOUND fault. The top-down analog of Flutter's\n findAncestorStateOfType. The returned `Element*` is a stable handle (valid\n across frames), and it is *the* thing to hold when a callback will both read\n and invalidate a widget: resolve it once here, then `widget_as` (a cast) and\n `request_paint` (a flag flip) are both search-free. That is the hot path \u2014 the\n `get_widget` / `request_paint` twins below each re-walk the tree, so pairing\n them to mutate-then-repaint one node walks it twice. Use those only for\n one-shots.","return":"The first element whose widget is $Type.","params":[{"name":"$Type","description":"The widget type to look for."}]}},{"name":"get_widget","kind":"macro_method","uid":"cui::Ui.get_widget","file":"src/ui.c3:417:10","members":[{"name":"self","type":{"name":"Ui*","uid":"cui::Ui"},"is_ref":true},{"name":"$Type"}],"docs":{"text":"One-shot convenience over `find`: hand back the widget pointer directly\n (`get_widget(Dial)` \u2192 `Dial*`), or re-raise WIDGET_NOT_FOUND. One tree walk \u2014\n right for reading a singleton's field. To mutate AND repaint, hold the\n `Element*` from `find` instead, so invalidation doesn't walk the tree a second\n time. A callback reaches this through a Ui it is handed \u2014 a Button passes its\n own element's ui to `on_click`, so no global and no app-threaded handle is\n needed. Acts on the first $Type in the tree, so it fits singletons (one Dial,\n one settings panel); name a node with `with_id` when several coexist.","return":"A pointer to the first $Type widget in the tree.","params":[{"name":"$Type","description":"The widget type to look for."}]}},{"name":"request_paint","kind":"macro_method","uid":"cui::Ui.request_paint","file":"src/ui.c3:430:10","members":[{"name":"self","type":{"name":"Ui*","uid":"cui::Ui"},"is_ref":true},{"name":"$Type"}],"docs":{"text":"One-shot invalidate by type: one tree walk, a no-op if absent. Same caveat \u2014 if\n you already hold the element, call `elem.request_paint()` and skip the walk.","params":[{"name":"$Type","description":"The widget type to repaint."}]}},{"name":"get_widget_id","kind":"macro_method","uid":"cui::Ui.get_widget_id","file":"src/ui.c3:497:10","members":[{"name":"self","type":{"name":"Ui*","uid":"cui::Ui"},"is_ref":true},{"name":"id","type":{"name":"String"}},{"name":"$Type"}],"docs":{"text":"One-shot twin keyed by id \u2014 same single-walk cost and same caveat: hold the\n `Element*` from `find_id` to mutate-then-repaint without a second walk. Still\n takes $Type: the id selects which node, the type says how to hand its widget\n back.","return":"A pointer to the widget of the element carrying the id.","params":[{"name":"id","description":"The name given with with_id."},{"name":"$Type","description":"The widget type of that node."}]}},{"name":"request_paint_id","kind":"macro_method","uid":"cui::Ui.request_paint_id","file":"src/ui.c3:508:10","members":[{"name":"self","type":{"name":"Ui*","uid":"cui::Ui"},"is_ref":true},{"name":"id","type":{"name":"String"}}],"docs":{"text":"One-shot invalidate by id: one tree walk, a no-op if absent.","params":[{"name":"id","description":"The name given with with_id."}]}},{"name":"@modify","kind":"macro_method","uid":"cui::Ui.@modify","file":"src/ui.c3:532:15","return_type":{"name":"void"},"is_at_macro":true,"members":[{"name":"self","type":{"name":"Ui*","uid":"cui::Ui"},"is_ref":true},{"name":"$Type"},{"name":"@body","kind":"body_param","params":[{"name":"widget"}]}],"docs":{"text":"Walks the tree a single time, hands the body the typed widget, then\n `request_paint()`s the element, so\n\n     ui.@modify(Dial; d) { d.value = 0; };\n\n is the one-walk equal of `find` + `widget_as` + `request_paint`. The body runs\n only if the node exists (a silent no-op otherwise), and the invalidation is\n kind-aware: a painting widget repaints, a composite rebuilds its subtree\n (`request_paint` routes to `request_build`). For a change that resizes a\n non-composite widget (needing `request_layout`) hold the `Element*` from `find`\n and invalidate it yourself.","params":[{"name":"$Type","description":"The widget type to modify."}]}},{"name":"@modify_id","kind":"macro_method","uid":"cui::Ui.@modify_id","file":"src/ui.c3:551:15","return_type":{"name":"void"},"is_at_macro":true,"members":[{"name":"self","type":{"name":"Ui*","uid":"cui::Ui"},"is_ref":true},{"name":"id","type":{"name":"String"}},{"name":"$Type"},{"name":"@body","kind":"body_param","params":[{"name":"widget"}]}],"docs":{"text":"The id-keyed twin of `@modify` \u2014 names the node instead of finding it by type\n (still passing $Type to type the widget):\n\n     ui.@modify_id(\"teal\", Rectangle; card) { card.style.color = red; };","params":[{"name":"id","description":"The name given with with_id."},{"name":"$Type","description":"The widget type of that node."}]}}],"types":[{"name":"Texture","kind":"distinct type","uid":"cui::Texture","file":"src/canvas.c3:26:9","base_type":{"name":"int"},"members":[],"docs":{"text":"Opaque texture handle referenced by drawings; 0 = untextured. Handles come from\n the backend that consumes the canvas \u2014 with the built-in renderer, from\n `cui::vulkan` `Renderer.load_image` / `load_pixels`. The value is a 1-based\n index into the sampler array of the backend (shader binding 1)."}},{"name":"Drawing","kind":"struct","uid":"cui::Drawing","file":"src/canvas.c3:40:8","members":[{"name":"kind","type":{"name":"DrawingKind","uid":"cui::DrawingKind"}},{"name":"texture","type":{"name":"int"}},{"name":"border_width","type":{"name":"float"}},{"name":"transform_id","type":{"name":"uint"}},{"name":"size","type":{"name":"Vec2","uid":"std::math::vector::Vec2"}},{"name":"c lem","type":{"name":"Element*","uid":"cui::Element"}},{"name":"event","type":{"name":"KeyEvent","uid":"cui::KeyEvent"}}],"is_optional":true},{"name":"update","type":{"name":"void"},"params":[{"name":"elem","type":{"name":"Element*","uid":"cui::Element"}},{"name":"dt","type":{"name":"float"}}],"is_optional":true},{"name":"unmount","type":{"name":"void"},"params":[],"is_optional":true}],"docs":{"text":"A widget is behavior attached to an Element. All methods are optional:\n\n - `build` \u2014 compose this widget out of existing widgets: return a subtree made\n   with `elem.ui.@node` \u2014 the framework attaches it as the element's single\n   child on the flush after the element enters the tree (a build widget takes\n   no @node children of its own; the built subtree IS its content). With\n   `layout` omitted, the element sizes itself to the built subtree. After\n   mutating fields, call `elem.request_build()` (or use `ui.@modify`) to\n   regenerate the subtree. Must be pure: read own fields, produce nodes \u2014 state\n   that must survive a rebuild lives on the composite, not inside the built\n   subtree. See test/composite.c3 and build.md.\n - `layout` \u2014 given constraints, return own size; lay out children through\n   `elem.layout_child` / `elem.place_child`. Omitted: a build widget delegates\n   to its built subtree; otherwise children get loose constraints and keep their\n   offsets, and the size fills the constraints.\n - `paint` \u2014 emit primitives in element-local coordinates. Omitted: the element\n   draws nothing itself (pure container).\n - `on_mouse` \u2014 press/release/move/scroll, hit-tested and bubbling: the deepest\n   element under the pointer gets it first; return true to consume. Consuming a\n   PRESS captures the mouse until that button releases.\n - `on_hover` \u2014 pointer entered (true) / left (false) this element.\n - `on_key` \u2014 key press/release edges, delivered to the focused element (left\n   click focuses; see `Element.request_focus`), bubbling like `on_mouse`.\n - `update` \u2014 called every frame with the frame's dt \u2014 for animations and\n   polling `ui.input`; mutate state then `request_paint()`.\n - `unmount` \u2014 free whatever the widget allocated; called when its element\n   leaves the tree. The widget struct itself stays caller-owned.\n\n The built-in implementations (Rectangle, Column, Row, Stack, Padding, Clip,\n Scroll, Button) live in module `cui::widgets`; apps write their own against\n this interface."}},{"name":"Element","kind":"struct","uid":"cui::Element","file":"src/ui.c3:192:8","members":[{"name":"ui","type":{"name":"Ui*","uid":"cui::Ui"}},{"name":"widget","type":{"name":"Widget","uid":"cui::Widget"}},{"name":"id","type":{"name":"String"}},{"name":"parent","type":{"name":"Element*","uid":"cui::Element"}},{"name":"children","type":{"name":"List{Element*}","uid":"std::collections::list::List{Element*}"}},{"name":"last_constraints","type":{"name":"Constraints","uid":"cui::Constraints"}},{"name":"size","type":{"name":"Vec2","uid":"std::math::vector::Vec2"}},{"name":"offset","type":{"name":"Vec2","uid":"std::math::vector::Vec2"}},{"name":"absolute","type":{"name":"Vec2","uid":"std::math::vector::Vec2"}},{"name":"cursor","type":{"name":"Cursor","uid":"cui::Cursor"}},{"name":"local_drawings","type":{"name":"List{Drawing}","uid":"std::collections::list::List{Drawing}"}},{"name":"first_drawing","type":{"name":"sz","uid":"std::core::sz"}},{"name":"drawing_count","type":{"name":"sz","uid":"std::core::sz"}},{"name":"transform_slot","type":{"name":"uint"}},{"name":"clips","type":{"name":"bool"}},{"name":"clip_radii","type":{"name":"Vec4","uid":"std::math::vector::Vec4"}},{"name":"owns_widget","type":{"name":"bool"}},{"name":"dirty","type":{"name":"DirtyFlags","uid":"cui::DirtyFlags"}}],"docs":{"text":"One node of the retained tree: a widget's identity, its cached layout and its\n cached drawings. Elements are created by the node macros and recycled through\n a free-list, so e(ui)!!) { }`\n\n Engines with their own device and frame loop implement the same steps against\n the exports in src/shader.c3 instead (see \"Embedding in a Vulkan engine\" in\n README.md); this module doubles as the worked example."},"functions":[{"name":"update_atlas_image","kind":"function","uid":"cui::vulkan::update_atlas_image","file":"src/vulkan/render_state.c3:206:10","return_type":{"name":"void?"},"members":[{"name":"image","type":{"name":"Image","uid":"image::Image"}},{"name":"pixels","type":{"name":"char[]"}},{"name":"width","type":{"name":"uint"}},{"name":"height","type":{"name":"uint"}},{"name":"first","type":{"name":"bool"}},{"name":"allocator","type":{"name":"MemoryAllocator*","uid":"vk::MemoryAllocator"}},{"name":"queue","type":{"name":"DeviceQueue","uid":"vk::DeviceQueue"}}],"docs":{"text":"(Re)uploads the full pixel contents of an atlas image created by `load_atlas`.\n `first` selects the source barrier: UNDEFINED right after creation, otherwise\n the shader-read layout every update leaves the image in."}},{"name":"new","kind":"function","uid":"cui::vulkan::new","file":"src/vulkan/renderer.c3:127:14","return_type":{"name":"Renderer?","uid":"cui::vulkan::Renderer"},"members":[{"name":"window_size","type":{"name":"Vec2","uid":"std::math::vector::Vec2"},"default_value":"{800, 600}"},{"name":"enable_debug","type":{"name":"bool"},"default_value":"false"},{"name":"loop_mode","type":{"name":"LoopMode","uid":"cui::vulkan::LoopMode"},"default_value":"CONTINUOUS"}],"docs":{"text":"Opens a window and brings up the whole Vulkan stack for it: instance, device,\n swapchain, buffers and pipeline.","return":"The renderer, ready for frame().","params":[{"name":"window_size","description":"The window content size in pixels; also the root constraints for the Ui."},{"name":"enable_debug","description":"Turn on the Vulkan validation layers and the debug messenger."},{"name":"loop_mode","description":"Whether frame() redraws continuously or sleeps until input arrives."}] ":"height","type":{"name":"uint"}},{"name":"allocator","type":{"name":"MemoryAllocator*","uid":"vk::MemoryAllocator"}},{"name":"queue","type":{"name":"DeviceQueue","uid":"vk::DeviceQueue"}}],"docs":null},{"name":"load_atlas","kind":"method","uid":"cui::vulkan::List{DescriptorImageInfo}.load_atlas","file":"src/vulkan/render_state.c3:148:27","return_type":{"name":"void?"},"members":[{"name":"self","type":{"name":"List{DescriptorImageInfo}*","uid":"std::collections::list::List{DescriptorImageInfo}"},"is_ref":true},{"name":"pixels","type":{"name":"char[]"}},{"name":"width","type":{"name":"uint"}},{"name":"height","type":{"name":"uint"}},{"name":"allocator","type":{"name":"MemoryAllocator*","uid":"vk::MemoryAllocator"}},{"name":"queue","type":{"name":"DeviceQueue","uid":"vk::DeviceQueue"}},{"name":"out_image","type":{"name":"Image*","uid":"image::Image"}}],"docs":{"text":"Creates the dynamic glyph-atlas texture: single-channel R8 with linear\n filtering (an SDF must be sampled with interpolation), TRANSFER_DST so its\n contents can be re-uploaded as glyphs are baked in. The vk::Image is returned\n through `out_image` for those later `update_atlas_image` calls."}},{"name":"load_image","kind":"method","uid":"cui::vulkan::Renderer.load_image","file":"src/vulkan/renderer.c3:450:27","return_type":{"name":"Texture?","uid":"cui::Texture"},"members":[{"name":"self","type":{"name":"Renderer*","uid":"cui::vulkan::Renderer"},"is_ref":true},{"name":"path","type":{"name":"String"}}],"docs":{"text":"Uploads an image file (png/jpg) to the GPU and returns the handle to reference\n it with (`RectStyle.texture` / `CircleStyle.texture`).\n\n Textures can be loaded at any time; ones loaded between frames become valid on\n the next `frame()` call (the pipeline is rebuilt for the new sampler count at the\n top of a frame).","return":"The texture handle.","params":[{"name":"path","description":"Path to a png or jpg file."}]}},{"name":"load_pixels","kind":"method","uid":"cui::vulkan::Renderer.load_pixels","file":"src/vulkan/renderer.c3:466:27","return_type":{"name":"Texture?","uid":"cui::Texture"},"members":[{"name":"self","type":{"name":"Renderer*","uid":"cui::vulkan::Renderer"},"is_ref":true},{"name":"rgba","type":{"name":"char[]"}},{"name":"width","type":{"name":"uint"}},{"name":"height","type":{"name":"uint"}}],"docs":{"text":"Uploads raw RGBA8 pixels (a generated atlas, say) and returns the handle to\n reference them with.","return":"The texture handle.","params":[{"name":"rgba","description":"Tightly packed RGBA8 pixels, width * height * 4 bytes."},{"name":"width","description":"Image width in pixels."},{"name":"height","description":"Image height in pixels."}]}},{"name":"rebuild_pipeline","kind":"method","uid":"cui::vulkan::Renderer.rebuild_pipeline","file":"src/vulkan/renderer.c3:478:19","return_type":{"name":"void?"},"members":[{"name":"self","type":{"name":"Renderer*","uid":"cui::vulkan::Renderer"},"is_ref":true}],"docs":{"text":"(Re)creates the descriptor layout and pipeline for the current texture count.\n\n Runs before the first frame and again whenever `load_image` grew the texture\n array; the GPU is idled first, since in-flight frames still use the old pipeline."}},{"name":"sync_text","kind":"method","uid":"cui::vulkan::Renderer.sync_text","file":"src/vulkan/renderer.c3:562:19","return_type":{"name":"void?"},"members":[{"name":"self","type":{"name":"Renderer*","uid":"cui::vulkan::Renderer"},"is_ref":true},{"name":"ui","type":{"name":"Ui*","uid":"cui::Ui"}},{"name":"creating","type":{"name":"bool"}}],"docs":{"text":"Keeps the GPU copy of the Ui's glyph atlas in step with the CPU one.\n\n Before `flush` (with `creating` true): once the Ui has fonts, the atlas\n texture is created up front \u2014 paint caches drawings with the texture handle\n baked in, so the handle must exist before the first `Painter.text` runs.\n After `flush` (`creating` false): re-upload the pixels whenever glyph baking\n marked them dirty, so glyphs painted this frame gh that stale pointer (buffer growth,\n shutdown) reads a garbage device. Called wherever a free may follow."}},{"name":"frame","kind":"method","uid":"cui::vulkan::Renderer.frame","file":"src/vulkan/renderer.c3:732:19","return_type":{"name":"bool?"},"members":[{"name":"self","type":{"name":"Renderer*","uid":"cui::vulkan::Renderer"},"is_ref":true},{"name":"ui","type":{"name":"Ui*","uid":"cui::Ui"}}],"docs":{"text":"Runs one frame: poll input, dispatch to the widgets, flush the Ui, record the\n canvas and present.\n\n The app owns the loop; per-frame logic goes in the body, reading `ui.input`\n directly:\n\n     `while (renderer.frame(ui)!!)`\n     `{`\n     `    // app/game logic \u2014 mutations made here render on the next call`\n     `}`\n\n In ON_DEMAND mode the call blocks for input when nothing scheduled a frame, so\n the loop body only runs when frames do \u2014 a game simulation that must tick every\n iteration wants CONTINUOUS.","return":"False when the user asked to quit (ESCAPE or window close).","params":[{"name":"ui","description":"The Ui to drive. Its size tracks the window across resizes."}]}}],"types":[{"name":"DescriptorImages","kind":"alias","uid":"cui::vulkan::DescriptorImages","file":"src/vulkan/render_state.c3:8:7","base_type":{"name":"List{DescriptorImageInfo}","uid":"std::collections::list::List{DescriptorImageInfo}"},"members":[],"docs":null},{"name":"ShaderStageConfig","kind":"struct","uid":"cui::vulkan::ShaderStageConfig","file":"src/vulkan/render_state.c3:348:8","members":[{"name":"spirv","type":{"name":"char[]"}},{"name":"entry","type":{"name":"ZString","uid":"std::core::string::ZString"}},{"name":"stage","type":{"name":"ShaderStageFlagBits","uid":"vk::ShaderStageFlagBits"}}],"docs":null},{"name":"RenderState","kind":"struct","uid":"cui::vulkan::RenderState","file":"src/vulkan/render_state.c3:354:8","members":[{"name":"shaders","type":{"name":"ShaderStageConfig[]","uid":"cui::vulkan::ShaderStageConfig"}},{"name":"descriptor_layout","type": :{"name":"uint"}},{"name":"enable_debug","type":{"name":"bool"}}],"docs":{"text":"The window, the Vulkan device and everything the frame loop needs. Owns the\n three device-address buffers the shader reads (drawings, transforms, clips) and\n the texture array. Create with `new`, release with `free`."}},{"name":"LoopMode","kind":"enum","uid":"cui::vulkan::LoopMode","file":"src/vulkan/renderer.c3:48:6","base_type":{"name":"int"},"members":[{"name":"CONTINUOUS","type":{"name":"LoopMode","uid":"cui::vulkan::LoopMode"},"docs":null},{"name":"ON_DEMAND","type":{"name":"LoopMode","uid":"cui::vulkan::LoopMode"},"docs":null}],"docs":{"text":"How the reference frame loop paces itself.\n\n - CONTINUOUS \u2014 redraw every frame, poll input, run at the refresh rate of the\n   display (FIFO present) forever. Lowest latency; a core stays busy. Right when\n   something is always animating.\n - ON_DEMAND \u2014 after a frame, if nothing scheduled another (`ui.frame_requested`\n   is clear), block for input: the thread sleeps at 0% CPU until the user does\n   something. Right for mostly-static desktop UIs. A running animation keeps\n   scheduling frames, so it still plays smoothly; the loop only sleeps once\n   everything settles."}}],"variables":[{"name":"MAX_FRAMES_IN_FLIGHT","kind":"constant","uid":"cui::vulkan::MAX_FRAMES_IN_FLIGHT","file":"src/vulkan/renderer.c3:26:7","is_const":true,"value":"2","members":[],"docs":null},{"name":"APP_NAME","kind":"constant","uid":"cui::vulkan::APP_NAME","file":"src/vulkan/renderer.c3:27:7","is_const":true,"value":"UI EXAMPLE","members":[],"docs":null},{"name":"MAX_FRAME_DT","kind":"constant","uid":"cui::vulkan::MAX_FRAME_DT","file":"src/vulkan/renderer.c3:34:13","type":{"name":"float"},"is_const":true,"value":"0.1","members":[],"docs":{"text":"Upper bound on a frame delta, in seconds. A stall \u2014 or waking from an on-demand\n sleep after minutes idle \u2014 must not hand animations one enormous step. Also the\n usual spiral-of-death guard."}}
