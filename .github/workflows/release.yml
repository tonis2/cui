name: Release

on:
  push:
    tags:
      - "v*" # e.g. v0.1.0 — releases are cut from tags, not from every push
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to (re)build the release from, e.g. v0.1.0"
        required: true

env:
  C3C_VERSION: v0.8.2

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.name }}
          submodules: recursive

      - name: Build cui.c3l
        # Nothing is compiled or downloaded here: the Vulkan dylibs are committed
        # in the vulkan.c3l submodule (its vendor-vulkan workflow refreshes the
        # loader), so a release is just a zip of files that were tested as-is.
        #
        # One artifact serves every platform. Nothing links against Vulkan -- the
        # vk bindings dlopen the loader at runtime -- so the only binaries shipped
        # are the macOS loader + driver dylibs, found through cui::vulkan's
        # candidate paths. Linux and Windows use the machine's own loader.
        run: |
          set -e
          mkdir -p pkg/deps/vk pkg/deps/image pkg/deps/c3w pkg/deps/font
          cp -R src pkg/src
          cp manifest.json pkg/

          # vk, c3w, image and font are vendored in, so a consumer depends on "cui" alone.
          cp -R lib/vulkan.c3l/vk/. pkg/deps/vk/
          cp -R lib/image.c3l/src/. pkg/deps/image/
          cp -R lib/font.c3l/src/. pkg/deps/font/
          cp -R lib/window.c3l/main.c3 \
                lib/window.c3l/darwin \
                lib/window.c3l/linux \
                lib/window.c3l/win32 pkg/deps/c3w/

          # vulkan.c3l carries the macOS loader + driver dylibs in a per-target
          # directory -- the same layout cui.c3l needs -- so they are copied
          # straight across. Missing files fail the release rather than shipping
          # something that cannot run on macOS.
          mkdir -p pkg/macos-aarch64
          cp lib/vulkan.c3l/macos-aarch64/* pkg/macos-aarch64/
          test -f pkg/macos-aarch64/libvulkan.1.dylib
          test -f pkg/macos-aarch64/libvulkan_kosmickrisp.dylib

          cd pkg && zip -qr ../cui.c3l . && cd ..
          unzip -l cui.c3l | grep -E 'macos-aarch64'

      - name: Upload cui.c3l
        uses: actions/upload-artifact@v4
        with:
          name: cui.c3l
          path: cui.c3l
          if-no-files-found: error

  # Prove the artifact builds on every platform before publishing it. A broken
  # manifest fails the release instead of shipping a .c3l nobody can build
  # against. Building is the whole test -- the runners have no GPU, so nothing
  # is run. No Vulkan SDK is installed on any runner: nothing links against
  # Vulkan, which is itself part of what is being verified.
  verify:
    needs: package
    strategy:
      fail-fast: true
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Fetch cui.c3l
        uses: actions/download-artifact@v4
        with:
          name: cui.c3l
          path: consumer/lib

      - name: Install C3
        shell: bash
        run: |
          case "${{ runner.os }}" in
            Linux)   curl -fsSL "https://github.com/c3lang/c3c/releases/download/${C3C_VERSION}/c3-linux.tar.gz" -o c3.tgz && tar xzf c3.tgz ;;
            macOS)   curl -fsSL "https://github.com/c3lang/c3c/releases/download/${C3C_VERSION}/c3-macos.zip"    -o c3.zip && unzip -q c3.zip ;;
            Windows) curl -fsSL "https://github.com/c3lang/c3c/releases/download/${C3C_VERSION}/c3-windows.zip"  -o c3.zip && unzip -q c3.zip ;;
          esac
          chmod +x c3/c3c || true
          echo "$PWD/c3" >> "$GITHUB_PATH"

      - name: Consumer project depending on cui alone
        shell: bash
        run: |
          mkdir -p consumer/src
          cat > consumer/project.json <<'EOF'
          {
            "langrev": "1",
            "warnings": [ "no-unused" ],
            "dependency-search-paths": [ "lib" ],
            "dependencies": [ "cui" ],
            "sources": [ "src/**" ],
            "output": "build",
            "targets": { "smoke": { "type": "executable" } }
          }
          EOF
          # Referencing the renderer forces vk and c3w to compile -- with no Vulkan
          # SDK on the runner, which is exactly what is being verified.
          cat > consumer/src/main.c3 <<'EOF'
          module smoke;
          import cui;
          import cui::widgets;
          import cui::vulkan;

          fn int main()
          {
          	void* renderer_entry = (void*)&cui::vulkan::new;
          	Constraints c = { .min = { 0, 0 }, .max = { 320, 240 } };
          	Rectangle r = { .size = { 10, 10 } };
          	return renderer_entry == null ? 1 : (int)cui::clamp_size(r.size, c).x;
          }
          EOF

      - name: Build against cui.c3l
        shell: bash
        working-directory: consumer
        run: c3c build smoke

      - name: No Vulkan dylib dependency (macOS)
        if: runner.os == 'macOS'
        working-directory: consumer
        run: |
          # The loader is dlopened at runtime, never linked, so a macOS app must
          # not reference any Vulkan dylib -- the bundled loader + driver are
          # found through cui::vulkan's candidate paths instead.
          if otool -L build/smoke | grep -iE 'vulkan|moltenvk'; then
            echo "unexpected Vulkan dylib dependency"; exit 1
          fi
          echo "self-contained: no Vulkan dylib dependency"

  release:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the release, and push the regenerated docs

    steps:
      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Build the docs from the tagged commit. Dependencies live in lib/*.c3l
          # as submodules; docgen has to compile them. Full history so the docs
          # commit can land on main.
          ref: ${{ steps.tag.outputs.name }}
          submodules: recursive
          fetch-depth: 0

      - name: Fetch cui.c3l
        uses: actions/download-artifact@v4
        with:
          name: cui.c3l

      - name: Install C3
        run: |
          curl -fsSL "https://github.com/c3lang/c3c/releases/download/${C3C_VERSION}/c3-linux.tar.gz" -o c3.tar.gz
          tar xzf c3.tar.gz
          echo "$PWD/c3" >> "$GITHUB_PATH"

      - name: Generate API docs
        run: |
          # docgen always writes ./docs.html, ignoring -o. Path mode ignores
          # project.json dependencies, so the libs are passed explicitly --
          # without them src/vulkan/renderer.c3 fails to compile and no page is
          # written at all. docgen then embeds EVERY compiled module: vk alone is
          # 5.3 MB of a 7 MB page, std another 2 MB, cui's own modules 120 KB.
          # There is no flag to exclude them, so trim the embedded JSON after.
          c3c docgen --libdir lib --lib vk --lib c3w --lib image --lib font src
          python3 scripts/trim_docs.py docs.html cui
          # Park it outside the worktree: the next step switches branches.
          cp docs.html "$RUNNER_TEMP/index.html"

      - name: Publish docs to main
        # The tag checkout is a detached HEAD, so the docs commit is made on main
        # explicitly. GitHub Pages serves main's /docs folder.
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout -B main origin/main
          mkdir -p docs
          cp "$RUNNER_TEMP/index.html" docs/index.html
          if [ -n "$(git status --porcelain docs)" ]; then
            git add docs
            git commit -m "docs: API reference for ${{ steps.tag.outputs.name }} [skip ci]"
            git push origin main
          else
            echo "docs unchanged"
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: ${{ steps.tag.outputs.name }}
          files: cui.c3l
          generate_release_notes: true
